<title>TaFit · Entrenamiento</title>
<style>
  :root{
    --navy:#0D1B2A; --steel:#1B4F72; --accent:#2E86AB;
    --niebla:#7C93A6; --light:#E8F4F8; --white:#FFFFFF;
    --ink:#1B2733; --mute:#5C6B78; --line:#E1E8ED;
    --card:#F5F8FB; --ok:#27AE60; --okbg:#E5F6EC; --warn:#C0392B;
  }
  #app.theme-f{ --navy:#241023; --steel:#6E2A52; --accent:#C04D86; --niebla:#B08AA0; --light:#FBEEF4; --card:#FAF3F7; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--navy);color:var(--ink);min-height:100vh}
  a{color:var(--accent)}
  #app{max-width:600px;margin:0 auto;min-height:100vh;background:var(--light);display:flex;flex-direction:column}
  header{background:var(--navy);color:#fff;padding:14px 16px 12px}
  .topline{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .wm{font-weight:800;font-size:22px;letter-spacing:3px}
  .wm b{color:var(--accent)}
  .topright{display:flex;gap:8px;align-items:center}
  .lockbtn{background:var(--steel);border:none;color:#fff;border-radius:9px;padding:7px 11px;font-size:12px;font-weight:700;cursor:pointer}
  .cloud{font-size:11px;letter-spacing:.3px;color:var(--niebla);display:flex;align-items:center;gap:5px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--niebla)}
  .dot.on{background:var(--ok)}
  .dot.pend{background:#E6A23C;animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .pickrow{display:flex;gap:8px;margin-top:12px}
  select.alumno{flex:1;padding:11px 12px;border-radius:11px;border:none;font-size:15px;font-weight:700;color:var(--navy);background:#fff}
  .namestatic{flex:1;padding:11px 12px;border-radius:11px;background:#fff;color:var(--navy);font-size:15px;font-weight:700}
  .iconbtn{background:var(--steel);border:none;color:#fff;border-radius:11px;padding:0 14px;font-size:18px;font-weight:700;cursor:pointer}
  .iconbtn:hover{background:var(--accent)}
  nav{display:flex;background:var(--steel)}
  nav button{flex:1;padding:12px 3px;border:none;background:transparent;color:#cfe0ea;font-size:12px;font-weight:700;letter-spacing:.2px;cursor:pointer;border-bottom:3px solid transparent}
  nav button.active{color:#fff;border-bottom-color:var(--accent);background:rgba(255,255,255,.06)}
  main{flex:1;padding:16px 14px 40px}
  .focus{font-size:13px;color:var(--mute);margin-bottom:12px;text-align:center}
  .focus b{color:var(--steel)}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);margin-bottom:8px}

  .seg{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .seg button{flex:1;min-width:84px;padding:10px 4px;border:2px solid var(--line);background:#fff;border-radius:11px;font-size:13px;font-weight:700;color:var(--mute);cursor:pointer}
  .seg button.sel{border-color:var(--accent);color:var(--navy);background:var(--light)}
  .mseg{margin-top:-4px}
  .mseg button{border-radius:999px;padding:11px 4px}
  .mseg button.sel{background:var(--accent);border-color:var(--accent);color:#fff}
  .weeks{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
  .weeks button.wlock{opacity:.45;filter:grayscale(.5)}
  .weeks button{flex:1;min-width:54px;padding:9px 2px;border:2px solid var(--line);background:#fff;border-radius:10px;font-size:12px;font-weight:700;color:var(--mute);cursor:pointer;line-height:1.2}
  .weeks button small{display:block;font-weight:600;font-size:9px;color:var(--niebla)}
  .weeks button.sel{border-color:var(--steel);color:#fff;background:var(--steel)}
  .weeks button.sel small{color:#cfe0ea}
  .weekdesc{font-size:12px;color:var(--mute);background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:16px}

  .medbanner{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px 13px;margin-bottom:14px;font-size:12.5px;color:var(--steel);font-weight:700}
  .rules .rule{display:flex;gap:9px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--light)}
  .rules .rule:last-child{border-bottom:none}
  .rules .rule .ico{font-size:16px;flex:none;line-height:1.4}
  .rules .rule b{font-size:13px;color:var(--navy)}
  .rules .rule p{margin:1px 0 0;font-size:12px;color:var(--mute)}
  .legcard .opts{display:flex;gap:8px;margin-bottom:8px}
  .legcard .opts button{flex:1;padding:10px 0;border:2px solid var(--line);border-radius:11px;background:#fff;font-weight:700;font-size:13px;color:var(--mute);cursor:pointer}
  .legcard .opts button.ok.on{background:var(--ok);border-color:var(--ok);color:#fff}
  .legcard .opts button.warn.on{background:#cf8a23;border-color:#cf8a23;color:#fff}
  .alarmas{display:flex;flex-wrap:wrap;gap:7px}
  .alarmas button{padding:7px 11px;border:2px solid var(--line);border-radius:20px;background:#fff;font-size:12px;font-weight:600;color:var(--mute);cursor:pointer}
  .alarmas button.on{background:#fbeaea;border-color:var(--warn);color:var(--warn)}
  .legwarn{font-size:12px;color:var(--warn);background:#fbeaea;border-radius:9px;padding:9px 11px;margin-top:9px;line-height:1.4;font-weight:600}
  .legnote{font-size:11.5px;color:var(--mute);margin-top:8px;line-height:1.4}

  .progwrap{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:16px;border:1px solid var(--line)}
  .progbar{height:8px;background:var(--line);border-radius:6px;overflow:hidden;margin-bottom:7px}
  .progbar i{display:block;height:100%;background:var(--accent);width:0;transition:width .25s}
  .proglbl{font-size:12px;color:var(--mute);font-weight:600}

  .ex{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid var(--line);box-shadow:0 2px 8px rgba(13,27,42,.04)}
  .ex h3{font-size:15px;color:var(--navy);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .ex h3 .num{background:var(--steel);color:#fff;width:22px;height:22px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;flex:none}
  .ex .meta{font-size:12px;color:var(--mute);margin:4px 0 2px 30px}
  .ex .alt{font-size:12px;color:var(--niebla);margin:0 0 0 30px}
  .ex .alt b{color:var(--mute);font-weight:700}
  .chips{margin:9px 0 0 30px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .rest{font-size:12px;font-weight:700;color:var(--steel);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:5px 11px;cursor:pointer}
  .rest:hover{border-color:var(--accent)}
  .vid{font-size:12px;font-weight:700;text-decoration:none;color:var(--accent)}
  .tip{font-size:12px;color:var(--steel);background:var(--light);border-radius:9px;padding:9px 11px;margin:9px 0 0 30px;line-height:1.45}
  .lastw{font-size:11.5px;color:var(--mute);background:var(--card);border:1px dashed var(--line);border-radius:9px;padding:8px 11px;margin:9px 0 0 0;line-height:1.5}
  .lastw b{color:var(--steel)}
  .member-h{font-size:13px;font-weight:800;color:var(--steel);margin:14px 0 2px;display:flex;align-items:center;gap:7px;padding-top:11px;border-top:1px dashed var(--line)}
  .member-h::before{content:'';width:9px;height:9px;border-radius:50%;background:var(--accent);flex:none}
  .member-h .mo{font-size:11px;font-weight:600;color:var(--niebla)}
  table.sets{width:100%;border-collapse:collapse;margin-top:8px}
  table.sets th{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--niebla);font-weight:700;padding:4px;text-align:center}
  table.sets th.s{width:34px;text-align:left}
  table.sets td{padding:3px;text-align:center}
  table.sets td.s{font-size:12px;color:var(--mute);font-weight:700;text-align:left;padding-left:2px}
  .cell{width:100%;padding:9px 4px;border:2px solid var(--line);border-radius:9px;font-size:15px;text-align:center;outline:none}
  .cell:focus{border-color:var(--accent)}
  select.cell{padding:9px 2px;-webkit-appearance:none;appearance:none;background:#fff}
  .chk{width:30px;height:30px;border:2px solid var(--line);border-radius:9px;background:#fff;cursor:pointer;font-size:15px;color:transparent;line-height:1}
  .chk.on{background:var(--ok);border-color:var(--ok);color:#fff}

  details.rm{margin-top:9px;border:1px solid var(--line);border-radius:10px;background:var(--card);overflow:hidden}
  details.rm summary{list-style:none;cursor:pointer;padding:9px 12px;font-size:12px;font-weight:700;color:var(--steel);display:flex;justify-content:space-between;align-items:center}
  details.rm summary::-webkit-details-marker{display:none}
  details.rm summary .best{font-size:11px;color:var(--mute);font-weight:600}
  .rmgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 12px 12px}
  .rmgrid div{background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 2px;text-align:center}
  .rmgrid div b{display:block;font-size:14px;color:var(--navy)}
  .rmgrid div span{font-size:10px;color:var(--niebla);text-transform:uppercase;letter-spacing:.5px}
  .rmempty{padding:0 12px 12px;font-size:12px;color:var(--mute)}

  .obs-card textarea{width:100%;min-height:72px;padding:10px;border:2px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;outline:none;resize:vertical}
  .obs-card textarea:focus{border-color:var(--accent)}
  .session-close{width:100%;margin-top:6px;padding:13px;border:none;border-radius:12px;background:var(--steel);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
  .motiv-banner{background:linear-gradient(135deg,var(--accent),#6c5ce7);color:#fff;padding:12px 16px;border-radius:12px;font-size:13px;font-weight:600;text-align:center;line-height:1.5;margin-bottom:8px}
  .warmup-banner{background:#fff3e0;border:1.5px solid #ffb74d;border-radius:10px;padding:10px 14px;font-size:12px;color:#e65100;margin-bottom:8px;text-align:center;line-height:1.4}
  .cooldown-banner{background:#e8f5e9;border:1.5px solid #81c784;border-radius:10px;padding:10px 14px;font-size:12px;color:#2e7d32;margin-top:12px;text-align:center;line-height:1.4}
  .priv-notes{background:#fef9e7;border:1.5px solid #f9e79f;border-radius:12px;padding:12px;margin-top:12px}
  .pn-title{font-size:12px;font-weight:700;color:#7d6608;margin-bottom:6px}
  .record-banner{background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:700;text-align:center;margin-bottom:8px;animation:pulse 1s ease-in-out 2}
  .quick-edit{background:var(--light);border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:10px}
  .qe-title{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
  .mini-dash{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--navy);text-align:center;margin-bottom:8px;line-height:1.6}
  .prog-bar2{background:var(--light);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;color:var(--accent);text-align:center;margin-bottom:8px}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
  .install-banner{border-radius:14px;padding:16px;margin-bottom:12px;color:#fff;position:relative;overflow:hidden;background:linear-gradient(135deg,#1976d2,#1565c0)}
  .theme-f .install-banner{background:linear-gradient(135deg,#d4619a,#a8245e)}
  .install-banner::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:rgba(255,255,255,.08);border-radius:50%}
  .install-banner .ib-icon{font-size:32px;margin-bottom:8px}
  .install-banner .ib-title{font-size:15px;font-weight:800;margin-bottom:4px}
  .install-banner .ib-text{font-size:12px;opacity:.9;line-height:1.5;margin-bottom:12px}
  .install-banner .ib-btn{background:#fff;color:#1565c0;border:none;border-radius:10px;padding:11px 20px;font-size:13px;font-weight:700;cursor:pointer;width:100%;text-align:center}
  .theme-f .install-banner .ib-btn{color:#a8245e}
  .install-banner .ib-close{position:absolute;top:10px;right:12px;background:none;border:none;color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;z-index:1}
  .ios-steps{display:flex;gap:12px;margin:10px 0;justify-content:center}
  .ios-step{text-align:center;font-size:11px;opacity:.9}
  .ios-step .step-icon{font-size:22px;margin-bottom:4px}
  .streak-badge{background:linear-gradient(135deg,#f39c12,#e74c3c);color:#fff;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:700;text-align:center;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px}
  .weight-cmp{font-size:11px;color:var(--ok);font-weight:600;margin-top:2px}
  .weight-cmp.down{color:var(--warn)}
  .weight-cmp.same{color:var(--mute)}
  .copy-report{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin:12px 0}
  .mp-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:#009ee3;color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;width:100%;text-decoration:none}
  .photo-angles{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
  .photo-angles span{background:var(--light);border:1.5px solid var(--line);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--accent)}
  .studies-list{margin-top:10px}
  .study-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;font-size:12px}
  .study-item span{flex:1}
  .study-item button{background:none;border:none;color:var(--accent);font-weight:600;cursor:pointer;font-size:12px}
  .medidas-hist{margin-top:8px}
  .med-row{display:flex;gap:10px;flex-wrap:wrap;padding:6px 0;border-bottom:1px solid var(--line);font-size:12px;color:var(--navy)}
  .med-date{font-weight:700;color:var(--accent);min-width:60px}
  .med-row b{color:var(--navy)}
  .inact-block{background:#fef3f2;border:1.5px solid #fca5a5;border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .inact-title{font-size:13px;font-weight:700;color:#991b1b;margin-bottom:8px}
  .inact-list{display:flex;flex-wrap:wrap;gap:6px}
  .inact-chip{font-size:12px;font-weight:600;color:#991b1b;background:#fee2e2;padding:4px 10px;border-radius:8px}
  .renew-block{background:#eff6ff;border:1.5px solid #93c5fd;border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .renew-title{font-size:13px;font-weight:700;color:#1e40af;margin-bottom:8px}
  .renew-chip{font-size:12px;font-weight:600;color:#1e40af;background:#dbeafe;padding:4px 10px;border-radius:8px}
  .drop-row{display:flex;gap:3px}.dcell{flex:1;min-width:0;padding:7px 3px!important;text-align:center;font-size:11px!important}
  .move-btns{display:flex;flex-direction:column;gap:2px;margin-right:4px}.mbtn{background:var(--light);border:1px solid var(--line);border-radius:4px;font-size:10px;padding:1px 6px;cursor:pointer;color:var(--steel);line-height:1.2}.mbtn:disabled{opacity:.25;cursor:default}.mbtn:hover:not(:disabled){background:var(--accent);color:#fff}
  .session-close:hover{background:var(--navy)}
  .session-close.ready{background:var(--ok)}

  .tcard{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid var(--line)}
  details.tacc{padding:0}
  details.tacc summary{list-style:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:14px 16px}
  details.tacc summary::-webkit-details-marker{display:none}
  details.tacc summary h2{margin:0;padding:0;border:none}
  details.tacc .tchev{color:var(--niebla);font-size:14px;transition:transform .2s}
  details.tacc[open] .tchev{transform:rotate(180deg)}
  details.tacc .tacc-body{padding:0 16px 14px}
  .tcard h2{font-size:16px;color:var(--navy);margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--light)}
  .trow{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--light);font-size:13px}
  .trow:last-child{border-bottom:none}
  .trow .tn{color:var(--ink);font-weight:600}
  .trow .tn small{display:block;color:var(--niebla);font-weight:500}
  .trow .tv{color:var(--steel);font-weight:700;white-space:nowrap;text-align:right;font-size:12px}
  .prog-list p{font-size:13px;color:var(--mute);padding:7px 0;border-bottom:1px solid var(--light)}
  .prog-list p:last-child{border-bottom:none}
  .prog-list b{color:var(--navy)}
  .log-entry{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
  .log-entry summary{list-style:none;cursor:pointer;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;background:var(--card)}
  .log-entry summary::-webkit-details-marker{display:none}
  .log-entry summary .le-day{font-weight:700;color:var(--navy);font-size:14px}
  .log-entry summary .le-day small{display:block;color:var(--mute);font-weight:600;font-size:11px}
  .log-entry summary .le-meta{font-size:11px;color:var(--steel);font-weight:700;text-align:right}
  .log-body{padding:6px 14px 12px}
  .log-ex{padding:8px 0;border-bottom:1px solid var(--light)}
  .log-ex:last-child{border-bottom:none}
  .log-ex .len{font-size:13px;font-weight:700;color:var(--navy)}
  .log-ex .lsets{font-size:12px;color:var(--mute);margin-top:3px}
  .log-ex .lsets b{color:var(--steel)}
  .log-obs{font-size:12px;color:#8a3327;background:#fdecea;border-radius:8px;padding:9px 11px;margin-top:10px;line-height:1.45}
  .log-health{font-size:12px;border-radius:8px;padding:9px 11px;margin-top:10px;line-height:1.45;font-weight:600}
  .log-health.ok{color:var(--steel);background:var(--light)}
  .log-health.flag{color:var(--warn);background:#fbeaea}
  .log-del{display:block;text-align:right;margin-top:8px}

<script>
/* ====================================================================
   TaFit · multi-alumno · v8 (Firebase sync + offline + dúos por pestaña + timer manual)
   ==================================================================== */
let fireSync=()=>{},fireDel=()=>{};
let _fromRemote=false;
const DEVICE_ID=(()=>{ try{ let id=localStorage.getItem('tafit:devid'); if(!id){ id='d_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); localStorage.setItem('tafit:devid',id); } return id; }catch(e){ return 'd_'+Math.random().toString(36).slice(2,10); } })();

const Store=(()=>{
  const cloud=(typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function');
  let ls=false; try{ localStorage.setItem('__t','1'); localStorage.removeItem('__t'); ls=true; }catch(e){ ls=false; }
  const mem={};
  async function get(k){ if(cloud){ try{ const r=await window.storage.get(k,false); return r?r.value:null; }catch(e){ return null; } } if(ls){ try{ return localStorage.getItem(k); }catch(e){ return (k in mem)?mem[k]:null; } } return (k in mem)?mem[k]:null; }
  async function set(k,v){ if(cloud){ try{ await window.storage.set(k,v,false); fireSync(k,v); return true; }catch(e){ return false; } } if(ls){ try{ localStorage.setItem(k,v); fireSync(k,v); return true; }catch(e){ return false; } } mem[k]=v; fireSync(k,v); return true; }
  async function del(k){ if(cloud){ try{ await window.storage.delete(k,false); fireDel(k); return; }catch(e){} } if(ls){ try{ localStorage.removeItem(k); fireDel(k); return; }catch(e){} } delete mem[k]; fireDel(k); }
  return { get,set,del, where:cloud?'nube':(ls?'dispositivo':'memoria'), cloud, ls };
})();

const cp=x=>JSON.parse(JSON.stringify(x));
const DEFAULT_WEEKS=[
  {t:"S1",n:"Base",d:"Afianzá la técnica con el peso actual. Series controladas."},
  {t:"S2",n:"Volumen",d:"Sumá 1–2 reps por serie, mismo peso."},
  {t:"S3",n:"Carga",d:"Subí el peso, volvés a las reps base."},
  {t:"S4",n:"Pico",d:"Más carga y más reps, semana fuerte."}
];

function renderFormHTML(schema,data,type,editable){
  let h='';
  schema.forEach((sec,si)=>{
    const secOpen=!sec.accordion||data._ts;
    h+=`<div class="form-sec"><div class="form-sec-hdr ${type}" data-act="formAccordion" data-si="${si}" style="cursor:pointer;display:flex;align-items:center">${esc(sec.title)}${sec.accordion?'<span class="ex-chev" style="margin-left:auto;font-size:14px">▾</span>':''}</div><div class="form-body form-acc-body" data-secidx="${si}"${sec.accordion&&!secOpen?' style="display:none"':''}><div class="form-grid">`;
    sec.fields.forEach(f=>{
      const val=data[f.k]||'';
      const cls='form-field'+(f.full?' full':'');
      const req=f.req?'<span class="req"> *</span>':'';
      if(f.type==='fixed'){
        h+=`<div class="${cls}"><div class="form-lbl">${esc(f.l)}</div><div class="form-view-val" style="font-weight:600">${esc(f.value)}</div></div>`;
      } else if(!editable){
        let display=val;
        if(f.type==='check') display=val?'✓ Sí':'✗ No';
        if(f.type==='yesno') display=val==='si'?'Sí':(val==='no'?'No':'—');
        if(f.type==='checks'&&Array.isArray(val)) display=val.join(', ')||'—';
        if(!display&&display!==0) display='—';
        h+=`<div class="${cls}"><div class="form-lbl">${esc(f.l)}</div><div class="form-view-val">${esc(String(display))}</div></div>`;
      } else if(f.type==='textarea'){
        const show=f.reveal?(' data-reveal="'+f.reveal+'"'):'';
        h+=`<div class="${cls}"${show}${f.reveal&&data[f.reveal]!=='si'?' style="display:none"':''}><div class="form-lbl">${esc(f.l)}${req}</div><textarea class="form-inp" data-fk="${f.k}">${esc(val)}</textarea></div>`;
      } else if(f.type==='select'){
        h+=`<div class="${cls}"><div class="form-lbl">${esc(f.l)}${req}</div><select class="form-inp" data-fk="${f.k}"><option value="">Seleccioná...</option>`;
        (f.opts||[]).forEach(o=>{ h+=`<option value="${esc(o)}"${val===o?' selected':''}>${esc(o)}</option>`; });
        h+=`</select></div>`;
      } else if(f.type==='check'){
        h+=`<div class="${cls}"><label class="form-chk"><input type="checkbox" data-fk="${f.k}" data-ftype="check"${val?' checked':''}> ${esc(f.l)}${req}</label></div>`;
      } else if(f.type==='checks'){
        const arr=Array.isArray(val)?val:[];
        h+=`<div class="${cls}"><div class="form-lbl">${esc(f.l)}${req}</div><div class="form-checks">`;
        (f.opts||[]).forEach(o=>{ h+=`<label class="form-chk"><input type="checkbox" data-fk="${f.k}" data-ftype="checks" value="${esc(o)}"${arr.includes(o)?' checked':''}> ${esc(o)}</label>`; });
        h+=`</div></div>`;
      } else if(f.type==='yesno'){
        h+=`<div class="${cls}"><div class="form-lbl">${esc(f.l)}${req}</div><div class="form-radios"><label class="form-rad"><input type="radio" name="f_${f.k}" data-fk="${f.k}" data-ftype="yesno" value="no"${val==='no'?' checked':''}> No</label><label class="form-rad"><input type="radio" name="f_${f.k}" data-fk="${f.k}" data-ftype="yesno" value="si"${val==='si'?' checked':''}> Sí</label></div></div>`;
      } else {
        const show=f.reveal?(' data-reveal="'+f.reveal+'"'):'';
        h+=`<div class="${cls}"${show}${f.reveal&&data[f.reveal]!=='si'?' style="display:none"':''}><div class="form-lbl">${esc(f.l)}${req}</div><input class="form-inp" type="${f.type||'text'}" data-fk="${f.k}" value="${esc(val)}"></div>`;
      }
    });
    h+=`</div></div></div>`;
  });
  return h;
}

function collectFormData(container){
  const data={};
  container.querySelectorAll('[data-fk]').forEach(el=>{
    const k=el.getAttribute('data-fk'), ft=el.getAttribute('data-ftype')||'';
    if(ft==='check'){ data[k]=el.checked; }
    else if(ft==='checks'){
      if(!data[k]) data[k]=[];
      if(el.checked) data[k].push(el.value);
    }
    else if(ft==='yesno'){ if(el.checked) data[k]=el.value; }
    else { data[k]=el.value; }
  });
  return data;
}

async function renderFormTab(type){
  const schema=type==='acuerdo'?FORM_ACUERDO:FORM_ANAMNESIS;

  if(filled) h+=`<div style="margin-bottom:12px"><span class="form-status done">✓ Completado · ${data._ts?new Date(data._ts).toLocaleDateString('es-AR'):''}</span></div>`;
  else h+=`<div style="margin-bottom:12px"><span class="form-status pending">⏳ Pendiente de completar</span></div>`;
  h+=`<div id="formContainer">`;
  h+=renderFormHTML(schema,data,type,!locked||true);

  $('main').innerHTML=h;
}

let PENDING=safeParse((()=>{try{return localStorage.getItem('tafit:pending')}catch(e){return null}})()||'[]',[]);
function _savePending(){ try{ localStorage.setItem('tafit:pending',JSON.stringify(PENDING)); }catch(e){} }
function markPending(k){ if(PENDING.indexOf(k)<0){ PENDING.push(k); _savePending(); } syncBadge(); }
function clearPending(k){ const i=PENDING.indexOf(k); if(i>=0){ PENDING.splice(i,1); _savePending(); } syncBadge(); }
function syncBadge(){ if(!fsDB) return; if(PENDING.length){ $('clouddot').className='dot pend'; $('cloudlbl').textContent='⏳ Pendiente ('+PENDING.length+')'; } else updateSyncUI(true); }
function _pushRaw(k,v){ return new Promise(res=>{ let done=false; const t=setTimeout(()=>{ if(!done){ done=true; res(false); } },8000);
  fsDB.collection('kv').doc(k).set({v:v,ts:firebase.firestore.FieldValue.serverTimestamp(),dev:DEVICE_ID})
    .then(()=>{ if(!done){ done=true; clearTimeout(t); res(true); } })
    .catch(()=>{ if(!done){ done=true; clearTimeout(t); res(false); } });
}); }
async function cloudPush(k,v){ if(!fsDB||_fromRemote) return; const ok=await _pushRaw(k,v); if(ok) clearPending(k); else markPending(k); }
async function flushPending(){ if(!fsDB||!PENDING.length) return; const list=PENDING.slice();
  for(const k of list){ let v=null; try{ v=localStorage.getItem(k); }catch(e){} if(v==null){ clearPending(k); continue; }
    const ok=await _pushRaw(k,v); if(ok) clearPending(k); else break; }
}
window.addEventListener('online',()=>setTimeout(flushPending,800));
setInterval(()=>{ if(navigator.onLine) flushPending(); },30000);
async function cloudDel(k){ if(!fsDB||_fromRemote) return; try{ fsDB.collection('kv').doc(k).delete(); }catch(e){} }
async function pushAllLocal(){ if(!fsDB) return; let keys;
  if(locked&&active){ keys=myKeys(); }
  else { keys=['tafit:students']; DB.order.forEach(id=>{ keys.push('tafit:data:'+id,'tafit:logs:'+id,'tafit:form:acuerdo:'+id,'tafit:form:anamnesis:'+id); }); }
  for(const k of keys){ try{ const v=localStorage.getItem(k); if(v&&v!=='{}'&&v!=='[]'&&v!=='""') await cloudPush(k,v); }catch(e){} } }
async function reloadFromRemote(){ try{ const raw=await Store.get('tafit:students'); if(raw){ const p=safeParse(raw,null); if(p&&p.order&&p.order.length) DB=p; } if(DB.students[active]){ CACHE=safeParse(await Store.get('tafit:data:'+active)||'{}',{}); LOGS=safeParse(await Store.get('tafit:logs:'+active)||'[]',[]); } render(); }catch(e){} }

  return ['tafit:students','tafit:data:'+active,'tafit:logs:'+active,'tafit:form:acuerdo:'+active,'tafit:form:anamnesis:'+active];

  const col=fsDB.collection('kv');

async function initFirebase(){
  if(typeof firebase==='undefined'||!firebase.initializeApp){ updateSyncUI(false); return; }
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    fsDB=firebase.firestore();
    /* caché offline de Firestore: la app abre y lee aunque no haya señal */
    try{ await fsDB.enablePersistence({synchronizeTabs:true}); }catch(e){}
    /* test de escritura (sin bloquear el arranque si no hay señal) */
    _pushRaw('tafit:ping','ok').then(ok=>{ if(ok){ updateSyncUI(true); flushPending(); } });
    /* pull: cloud → local (solo si local no tiene) */
    try{ const snap=await kvQuery().get(); snap.forEach(function(doc){ var k=doc.id,v=doc.data().v; if(shouldSync(k)&&v!=null){ try{ if(localStorage.getItem(k)!==v) localStorage.setItem(k,v); }catch(e){} } }); }catch(e){ console.warn('Pull:',e); }
    /* push: local → cloud */
    await pushAllLocal();
    /* real-time listener */
    kvQuery().onSnapshot(function(snap){
      var changed=false;
      snap.docChanges().forEach(function(ch){
        var k=ch.doc.id,data=ch.doc.data();
        if(!shouldSync(k)) return;
        try{
          if(ch.type==='removed') localStorage.removeItem(k);
          else if(data&&data.v!=null){
            var local=localStorage.getItem(k);
            if(local!==data.v){ localStorage.setItem(k,data.v); changed=true; }
          }
        }catch(e){}
      });
      if(changed&&!_fromRemote){ _fromRemote=true; reloadFromRemote().then(function(){ _fromRemote=false; }); }
    });
    /* activar hooks */
    fireSync=function(k,v){ if(!_fromRemote&&shouldSync(k)) cloudPush(k,v); };
    fireDel=function(k){ if(!_fromRemote&&shouldSync(k)) cloudDel(k); };
    if(navigator.onLine){ updateSyncUI(true); syncBadge(); toast('Sync activado ✓','ok'); }
    else { $('clouddot').className='dot pend'; $('cloudlbl').textContent='Sin señal · guardando acá'; }
  }catch(e){ console.error('Firebase:',e); $('cloudlbl').textContent='Error: '+(e.message||e); updateSyncUI(false); }
}

let tabataInt=null, tabataState=null;

  tabataState={work:work,rest:rest,rounds:rounds,round:1,phase:'work',time:work};
  paintTabata();
  tabataInt=setInterval(function(){
    tabataState.time--;
    if(tabataState.time<=0){
      if(tabataState.phase==='work'){
        if(tabataState.round>=tabataState.rounds){ stopTabata(); buzz(true); $('tabataPhase').textContent='¡TERMINADO!'; $('tabataPhase').className='tabata-phase done'; $('tabataTime').textContent='💪'; return; }
        tabataState.phase='rest'; tabataState.time=tabataState.rest; buzz(false);
      } else { tabataState.phase='work'; tabataState.round++; tabataState.time=tabataState.work; buzz(false); }
    }

  },1000);

function getStreak(){
  if(!LOGS.length) return 0;
  var streak=1;
  for(var i=0;i<LOGS.length-1;i++){
    var d1=new Date(LOGS[i].date), d2=new Date(LOGS[i+1].date);
    var diff=Math.floor((d1-d2)/(1000*60*60*24));
    if(diff<=3) streak++; else break;
  }
  return streak;
}
function showStreak(container){
  var s=getStreak();
  if(s<2) return;
  var div=document.createElement('div'); div.className='streak-badge';
  div.innerHTML='🔥 '+s+' sesiones consecutivas · ¡No pierdas la racha!';
  container.appendChild(div);
}
/* Comparativa de peso con sesión anterior */
function getLastWeight(exName,mi){
  for(var i=0;i<LOGS.length;i++){
    var log=LOGS[i];
    for(var j=0;j<log.ex.length;j++){
      if(log.ex[j].n!==exName) continue;
      if(log.ex[j].members&&log.ex[j].members[mi]){
        var sets=log.ex[j].members[mi].sets;
        for(var k=0;k<sets.length;k++){ if(sets[k].w&&sets[k].w!=='') return sets[k].w; }
      } else if(log.ex[j].sets){
        for(var k=0;k<log.ex[j].sets.length;k++){ if(log.ex[j].sets[k].w&&log.ex[j].sets[k].w!=='') return log.ex[j].sets[k].w; }
      }
    }
  }
  return null;
}
function weightCmpHTML(exName,mi){
  var prev=getLastWeight(exName,mi);
  if(!prev) return '';
  return '<span class="weight-cmp">Última vez: '+prev+' kg</span>';

/* Peso más alto registrado por ejercicio */
function lastFor(exName,forName){
  const mm=membersOf(), mname=forName||mm[isDuo()&&member>=0?member:0];
  for(let i=LOGS.length-1;i>=0;i--){ const log=LOGS[i]; if(!log.ex) continue;
    const x=log.ex.find(e2=>e2.n===exName); if(!x) continue;
    let sets=null;
    if(x.members){ const me=x.members.find(m2=>m2.name===mname); if(me) sets=me.sets; }
    else sets=x.sets;
    if(sets&&sets.length) return {date:log.date, sets};
  }
  return null;
}
function getMaxWeight(exName){
  let max=0;
  LOGS.forEach(function(log){ log.ex.forEach(function(x){
    if(x.n!==exName) return;
    if(x.members){ x.members.forEach(function(mm){ mm.sets.forEach(function(s){ var w=firstNum(s.w); if(w&&w>max) max=w; }); }); }
    else if(x.sets){ x.sets.forEach(function(s){ var w=firstNum(s.w); if(w&&w>max) max=w; }); }
  }); });
  return max;
}

function showRecord(name,old,now){ var existing=document.querySelector('.record-banner'); if(existing) existing.remove(); var div=document.createElement('div'); div.className='record-banner'; div.textContent='🏆 ¡Nuevo récord en '+name+'! '+old+' kg → '+now+' kg'; var main=$('main'); if(main) main.insertBefore(div,main.firstChild); setTimeout(function(){if(div.parentNode) div.remove();},5000); }
function updObs(v){ CACHE[OBSK()]=v; queueSave(); }
function toggleSet(ei,si,mi,el){ const k=K(ei,si,mi); CACHE[k]=CACHE[k]||{}; CACHE[k].done=!CACHE[k].done; el.classList.toggle('on',CACHE[k].done); progress(); queueSave(); }
function progress(){ const r=routine(); let total=0,done=0; const mi=isDuo()?member:0; let exDone=0; r[day].ex.forEach((ex,ei)=>{ let allDone=true; for(let si=0;si<ex.s;si++){ total++; if((CACHE[K(ei,si,mi)]||{}).done) done++; else allDone=false; } if(allDone&&ex.s>0) exDone++; }); const pct=total?Math.round(done/total*100):0; if($('prog')) $('prog').style.width=pct+'%'; if($('proglbl')) $('proglbl').textContent=`${done}/${total} series · ${exDone}/${r[day].ex.length} ejercicios · ${pct}%`; if($('progbar2')) $('progbar2').textContent=`Vas ${exDone} de ${r[day].ex.length} ejercicios · ${pct}% completado`; const b=$('closebtn'); if(b){ b.classList.toggle('ready',pct===100); b.textContent=pct===100?'✓ Sesión completa · guardar en transcripta':'Cerrar sesión y guardar en transcripta'; } }

function restSec(s){ if(!s) return 0; const str=String(s); if(str.includes(':')){ const p=str.split(':'); return (parseInt(p[0])||0)*60+(parseInt(p[1])||0); } const n=firstNum(str); return n?Math.round(n):0; }
/* Vibración + beep (el contexto de audio se crea en el tap para que iPhone lo permita) */
let _ac=null;
function audioWarm(){ try{ const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return; if(!_ac) _ac=new AC(); if(_ac.state==='suspended') _ac.resume(); }catch(e){} }
function buzz(long){ try{ if(navigator.vibrate) navigator.vibrate(long?[250,120,250,120,400]:[120]); }catch(e){}
  try{ if(!_ac) return; const n=long?3:1; for(let i=0;i<n;i++){ const o=_ac.createOscillator(),g=_ac.createGain(); o.connect(g); g.connect(_ac.destination); o.frequency.value=long?880:660; const t0=_ac.currentTime+i*0.28; g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.35,t0+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t0+0.22); o.start(t0); o.stop(t0+0.25); } }catch(e){} }
function startRest(sec){ stopRest(); if(!sec) return; audioWarm(); restLeft=sec; $('rest').classList.add('show'); paintRest(); restInt=setInterval(()=>{ restLeft--; if(restLeft<=0){ stopRest(); buzz(true); toast('¡Descanso terminado! 💪','ok'); } else paintRest(); },1000); }
function paintRest(){ const mm=Math.floor(restLeft/60), ss=restLeft%60; $('restnum').textContent = mm? (mm+':'+String(ss).padStart(2,'0')) : (ss+' s'); }
function stopRest(){ if(restInt){ clearInterval(restInt); restInt=null; } $('rest').classList.remove('show'); }

function firstNum(s){ if(s==null) return null; const m=String(s).replace(',','.').match(/-?\d+(\.\d+)?/); return m?parseFloat(m[0]):null; }
function bestSet(ei,mi){ const ex=routine()[day].ex[ei]; let best=null; for(let si=0;si<ex.s;si++){ const v=CACHE[K(ei,si,mi)]||{}; const w=firstNum(v.w),r=firstNum(v.r); if(w==null||r==null||w<=0||r<=0) continue; const e=w*(1+r/30); if(!best||e>best.e) best={w,r,e}; } return best; }
function rmHTML(ei,mi){ const b=bestSet(ei,mi); if(!b) return `<summary>RM estimados (8RM→1RM) <span class="best">cargá peso y reps</span></summary><div class="rmempty">Cuando cargues peso y reps de al menos una serie, calculo los RM con la fórmula de Epley.</div>`; let grid=''; for(let n=8;n>=1;n--){ grid+=`<div><b>${fmt(b.e/(1+n/30))}</b><span>${n}RM</span></div>`; } return `<summary>RM estimados (8RM→1RM) <span class="best">mejor: ${fmt(b.w)}×${b.r}</span></summary><div class="rmgrid">${grid}</div>`; }
function fmt(x){ return (Math.round(x*2)/2).toString().replace('.',',')+' kg'; }

async function closeSession(){
  const r=routine(), members=membersOf(), exs=[];
  r[day].ex.forEach((ex,ei)=>{
    const mem=[];
    members.forEach((mn,mi)=>{ const sets=[]; for(let si=0;si<ex.s;si++){ const v=CACHE[K(ei,si,mi)]||{}; if(v.w||v.r||v.rir||v.done) sets.push({s:si+1,w:v.w||'',r:v.r||'',rir:v.rir||'',done:!!v.done}); } if(sets.length) mem.push({name:mn,sets}); });
    if(mem.length){ if(members.length>1) exs.push({n:ex.n,members:mem}); else exs.push({n:ex.n,sets:mem[0].sets}); }
  });
  const obs=(CACHE[OBSK()]||'').trim();
  const h=health(); let hh=null;
  if(h&&h.enabled){ const pre=CACHE['hpre|'+day]||'', post=CACHE['hpost|'+day]||'', alarms=CACHE['halarm|'+day]||[]; if(pre||post||alarms.length) hh={pre,post,alarms}; }
  if(!exs.length && !obs && !hh){ toast("No hay nada cargado en esta sesión todavía",'warn'); return; }
  LOGS.unshift({ date:new Date().toISOString(), dayName:r[day].day, week, weekName:weeks()[week].t+' '+weeks()[week].n, ex:exs, obs, health:hh });
  await saveLogs();
  toast("Sesión guardada en la transcripta ✓",'ok');
  /* No borramos CACHE para que los datos sigan visibles */
  renderApp();
}

function resizeImage(file){ return new Promise((res,rej)=>{ const rd=new FileReader(); rd.onload=()=>{ const img=new Image(); img.onload=()=>{ const max=1000; let w=img.width,h=img.height; if(w>h && w>max){ h=Math.round(h*max/w); w=max; } else if(h>max){ w=Math.round(w*max/h); h=max; } const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h); res(cv.toDataURL('image/jpeg',0.72)); }; img.onerror=rej; img.src=rd.result; }; rd.onerror=rej; rd.readAsDataURL(file); }); }

function collectForm(){ const out=[]; document.querySelectorAll('.edit-day').forEach(dayEl=>{ const di=+dayEl.dataset.day; const dayName=(dayEl.querySelector('.dayname').value||'').trim()||('Día '+(di+1)); const exes=[]; dayEl.querySelectorAll('.edit-ex').forEach(exEl=>{ const g=f=>{ const el=exEl.querySelector('[data-field="'+f+'"]'); return el?el.value:''; }; const n=(g('n')||'').trim(); const obj={ n, s:Math.max(1,parseInt(g('s'))||1), r:(g('r')||'').trim()||'—', w:(g('w')||'').trim()||'A definir', alt:(g('alt')||'').trim(), tip:(g('tip')||'').trim(), rest:(g('rest')||'').trim(), vid:YT(n||'ejercicio') }; const w2el=exEl.querySelector('[data-field="w2"]'); if(w2el) obj.w2=(w2el.value||'').trim()||'A definir'; exes.push(obj); }); out[di]={ day:dayName, ex:exes }; }); return out; }
function collectWeeks(){ const out=[]; document.querySelectorAll('.week-row').forEach(wr=>{ const g=f=>{ const el=wr.querySelector('[data-wf="'+f+'"]'); return el?el.value.trim():''; }; out.push({ t:g('t')||'S', n:g('n')||'', d:g('d')||'' }); }); return out.length?out:cp(DEFAULT_WEEKS); }
function collectHealth(){ const sec=$('healthsec'); if(!sec) return DB.students[active].health; const g=sel=>{ const el=sec.querySelector(sel); return el?el.value:''; }; const enabled=g('[data-hf="enabled"]')==='on'; const leg=g('[data-hf="leg"]')==='on'; const tag=g('[data-hf="tag"]').trim(); const alarms=g('[data-hf="alarms"]').split(',').map(s=>s.trim()).filter(Boolean); const warning=g('[data-hf="warning"]').trim(); const rules=[]; sec.querySelectorAll('.hrule').forEach(rr=>{ const t=(rr.querySelector('[data-hf="rt"]').value||'').trim(); const d=(rr.querySelector('[data-hf="rd"]').value||'').trim(); if(t||d) rules.push({t,d}); }); return { enabled, tag, leg, alarms, warning, rules }; }
function collectMembers(){ const el=$('membersfld'); if(!el) return DB.students[active].members; const arr=el.value.split(',').map(s=>s.trim()).filter(Boolean); return arr; }
function syncFromForms(){ if(document.querySelector('.edit-day')) DB.students[active].routine=collectForm(); if(document.querySelector('.week-row')) DB.students[active].weeks=collectWeeks(); if($('healthsec')) DB.students[active].health=collectHealth(); if($('membersfld')){ const a=collectMembers(); if(a&&a.length>1){ DB.students[active].members=a; } else { delete DB.students[active].members; } } }
function addEx(di){ syncFromForms(); DB.students[active].routine[di].ex.push(isDuo()?exD("",4,"12","A definir","A definir","","",""):ex("",4,"12","A definir","","","")); renderEdit(); }
function removeEx(di,ei){ syncFromForms(); DB.students[active].routine[di].ex.splice(ei,1); renderEdit(); }
function moveEx(di,ei,dir){
  syncFromForms();
  const exArr=DB.students[active].routine[di].ex;
  const target=ei+dir;
  if(target<0||target>=exArr.length) return;
  /* swap exercises */
  const tmp=exArr[ei]; exArr[ei]=exArr[target]; exArr[target]=tmp;
  /* remap CACHE keys: swap prefixes day|a|* <-> day|b|* */
  const newCache={};
  const preA=di+'|'+ei+'|', preB=di+'|'+target+'|';
  Object.keys(CACHE).forEach(k=>{
    if(k.startsWith(preA)) newCache[preB+k.slice(preA.length)]=CACHE[k];
    else if(k.startsWith(preB)) newCache[preA+k.slice(preB.length)]=CACHE[k];
    else newCache[k]=CACHE[k];
  });
  CACHE=newCache;
  saveDB(); queueSave();
  /* adjust accordion */
  if(openEditEx===di*100+ei) openEditEx=di*100+target;
  else if(openEditEx===di*100+target) openEditEx=di*100+ei;
  openSecs.add('day'+di);
  renderEdit();
}
function addDay(){ syncFromForms(); DB.students[active].routine.push({day:"Día "+(routine().length+1), ex:[isDuo()?exD("Nuevo ejercicio",4,"12","A definir","A definir","","",""):ex("Nuevo ejercicio",4,"12","A definir","","","")]}); openSecs.add('day'+(routine().length-1)); renderEdit(); }

async function renderReport(){
  const m=$('main'); m.innerHTML='<div class="empty">Calculando informe…</div>';
  const cards=[];
  for(const id of DB.order){ const s=DB.students[id]; const logs = id===active ? LOGS : safeParse(await Store.get('tafit:logs:'+id)||'[]',[]); const last=logs.length?logs[0]:null; let adh=0; if(last){ let plan=0,h=0; last.ex.forEach(x=>{ if(x.members){ x.members.forEach(mm=>mm.sets.forEach(st=>{ plan++; if(st.done) h++; })); } else { x.sets.forEach(st=>{ plan++; if(st.done) h++; }); } }); adh=plan?Math.round(h/plan*100):0; }
  const fa=s.forms&&s.forms.acuerdo?safeParse(await Store.get('tafit:form:acuerdo:'+id)||'{}',{}):{};
  const fn=s.forms&&s.forms.anamnesis?safeParse(await Store.get('tafit:form:anamnesis:'+id)||'{}',{}):{};
  cards.push({ id, name:s.name, theme:s.theme, duo:s.members&&s.members.length>1, sessions:logs.length, last, week:last?(last.weekName||'—'):'—', adh, forms:s.forms||{}, fa, fn }); }
  let html=`<div class="focus">Resumen de todos tus alumnos</div>`;
  /* Alerta de inactividad: alumnos con 2+ días sin sesión */
  const inactivos=cards.filter(c=>{ if(!c.last) return true; return Math.floor((Date.now()-new Date(c.last.date).getTime())/86400000)>=2; });
  if(inactivos.length){ html+=`<div class="inact-block"><div class="inact-title">⚠ Alumnos sin entrenar (2+ días)</div><div class="inact-list">${inactivos.map(c=>{ const d=c.last?Math.floor((Date.now()-new Date(c.last.date).getTime())/86400000):999; return `<span class="inact-chip">${esc(c.name)} · ${d>=999?'nunca':(d+' días')}</span>`; }).join('')}</div></div>`; }
  const renovar=cards.filter(c=>{ if(c.sessions<4) return false; return true; });
  if(renovar.length){ html+=`<div class="renew-block"><div class="renew-title">🔄 Rutinas con 4+ semanas (considerar renovación)</div><div class="inact-list">${renovar.map(c=>`<span class="renew-chip">${esc(c.name)}</span>`).join('')}</div></div>`; }
  cards.forEach(c=>{ const flag=c.last&&c.last.health&&((c.last.health.alarms&&c.last.health.alarms.length)||c.last.health.pre==='warn'||c.last.health.post==='warn');
  let formBadges='';
  if(c.forms.acuerdo) formBadges+=c.fa._ts?'<span class="form-status done" style="margin:4px 4px 0 0">✓ Acuerdo</span>':'<span class="form-status pending" style="margin:4px 4px 0 0">⏳ Acuerdo</span>';
  if(c.forms.anamnesis) formBadges+=c.fn._ts?'<span class="form-status done" style="margin:4px 4px 0 0">✓ Anamnesis</span>':'<span class="form-status pending" style="margin:4px 4px 0 0">⏳ Anamnesis</span>';
  var daysSince=''; if(c.last){ var diff=Math.floor((Date.now()-new Date(c.last.date).getTime())/(1000*60*60*24)); if(diff>7) daysSince='<div class="inact">⚠ '+diff+' días sin entrenar</div>'; }
  html+=`<div class="rep-card"><div class="rh"><span class="rn">${c.theme==='f'?'🌸 ':''}${c.duo?'👯 ':''}${esc(c.name)}</span><span class="rw">${esc(c.week)}</span></div><div class="rep-stats"><div><b>${c.sessions}</b><span>Sesiones</span></div><div><b>${c.last?fmtShort(c.last.date):'—'}</b><span>Última</span></div><div><b>${c.adh}%</b><span>Últ. sesión</span></div></div>${daysSince}${formBadges?'<div style="margin-top:4px">'+formBadges+'</div>':''}<div class="rep-last">${c.last?'Último: '+esc(c.last.dayName):'Sin sesiones registradas todavía.'}</div>${c.last&&c.last.obs?`<div class="rep-flag" style="background:#fdecea;color:#8a3327">📝 ${esc(c.last.obs)}</div>`:''}${flag?`<div class="rep-flag">⚕ Revisar pierna · antes: ${esc(c.last.health.pre||'—')} / después: ${esc(c.last.health.post||'—')}${(c.last.health.alarms&&c.last.health.alarms.length)?' · '+esc(c.last.health.alarms.join(', ')):''}</div>`:''}${c.last?`<div class="rep-adh"><i style="width:${c.adh}%"></i></div>`:''}</div>`; });
  m.innerHTML=html;
  /* Botón copiar informe semanal */
  var copyBtn=document.createElement('button'); copyBtn.className='copy-report'; copyBtn.dataset.act='copyReport'; copyBtn.textContent='📋 Copiar informe semanal para WhatsApp'; m.appendChild(copyBtn);

/* Generar texto del informe para copiar */
function generateReportText(cards){
  var txt='📊 *INFORME SEMANAL TAFIT*\n'+new Date().toLocaleDateString('es-AR')+'\n\n';
  cards.forEach(function(c){
    var ds=c.last?Math.floor((Date.now()-new Date(c.last.date).getTime())/(1000*60*60*24)):999;
    txt+='*'+c.name+'*\n';
    txt+='  Sesiones: '+c.sessions+'\n';
    txt+='  Última: '+(c.last?fmtShort(c.last.date):'sin sesiones')+'\n';
    txt+='  Adherencia: '+c.adh+'%\n';
    if(ds>=2&&ds<999) txt+='  ⚠ '+ds+' días sin entrenar\n';
    if(c.last&&c.last.obs) txt+='  📝 '+c.last.obs+'\n';
    txt+='\n';
  });
  txt+='_Generado por TaFit_';
  return txt;
}

async function exportData(){ const p={ _app:'TaFit', _v:6, exported:new Date().toISOString(), db:DB, data:{}, logs:{} }; for(const id of DB.order){ p.data[id]=safeParse(await Store.get('tafit:data:'+id)||'{}',{}); p.logs[id]=safeParse(await Store.get('tafit:logs:'+id)||'[]',[]); } const blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='TaFit-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(url); toast("Backup descargado ✓",'ok'); }
function importData(e){ const f=e.target.files[0]; if(!f) return; const rd=new FileReader(); rd.onload=async()=>{ try{ const p=JSON.parse(rd.result); if(!p.db||!p.db.order) throw 0; DB=p.db; if(!DB.settings) DB.settings={pin:""}; if(!DB._seed) DB._seed={}; DB.order.forEach(id=>{ const s=DB.students[id]; if(!s.theme) s.theme=guessFem(s.name)?'f':'m'; if(!s.weeks) s.weeks=cp(DEFAULT_WEEKS); }); await saveDB(); for(const id of DB.order){ if(p.data&&p.data[id]) await Store.set('tafit:data:'+id,JSON.stringify(p.data[id])); if(p.logs&&p.logs[id]) await Store.set('tafit:logs:'+id,JSON.stringify(p.logs[id])); } if(!DB.students[active]) active=DB.order[0]; await Store.set('tafit:active',active); await loadStudent(); render(); toast("Backup importado ✓",'ok'); }catch(err){ toast("El archivo no es un backup válido",'warn'); } e.target.value=''; }; rd.readAsText(f); }

    case 'closeWelcome': var ov=$('welcomeOverlay'); if(ov) ov.remove(); try{ localStorage.setItem('tafit:welcome:'+active,'1'); }catch(e){} break;
    case 'saveWa': var wf=$('wafld'),mpf=$('mpfld'); if(wf) DB.settings.whatsapp=wf.value.trim(); if(mpf) DB.settings.mercadopago=mpf.value.trim(); saveDB(); toast('Datos guardados ✓','ok'); break;
    case 'copyReport': var rptCards=[]; DB.order.forEach(function(id){ var s=DB.students[id]; var logs=safeParse(localStorage.getItem('tafit:logs:'+id)||'[]',[]); var last=logs.length?logs[0]:null; var adh=0; if(last){var plan=0,h=0;last.ex.forEach(function(x){if(x.members){x.members.forEach(function(mm){mm.sets.forEach(function(st){plan++;if(st.done)h++})})}else if(x.sets){x.sets.forEach(function(st){plan++;if(st.done)h++})}});adh=plan?Math.round(h/plan*100):0;} rptCards.push({name:s.name,sessions:logs.length,last:last,adh:adh}); }); var txt=generateReportText(rptCards); navigator.clipboard.writeText(txt).then(function(){toast('Informe copiado ✓','ok')}).catch(function(){toast('No se pudo copiar','warn')}); break;
    case 'openTabata': openTabata(); break;
    case 'tabataStart': startTabata(); break;
    case 'tabataStop': stopTabata(); break;
    case 'tabataClose': closeTabata(); break;
  }
});
document.addEventListener('change',e=>{
  const el=e.target.closest('[data-chg]'); if(el){ switch(el.dataset.chg){
    case 'switch': switchStudent(el.value); break;
    case 'set': updSet(+el.dataset.i,+el.dataset.j,+(el.dataset.m||0),el.dataset.f,el.value); break;
    case 'dset': { const tr=el.closest('tr'); if(!tr) break; const inps=tr.querySelectorAll('[data-chg="dset"]'); const vals=[]; inps.forEach(inp=>vals.push(inp.value.trim())); updSet(+el.dataset.i,+el.dataset.j,+(el.dataset.m||0),'w',vals.join('/')); break; }
    case 'obs': updObs(el.value); break;
    case 'theme': setTheme(el.value); break;
    case 'photo': addPhoto(e); break;
    case 'photos': addMultiPhotos(e); break;
    case 'study': addStudy(e); break;
    case 'privNote': try{ localStorage.setItem('tafit:notes:'+active, el.value); }catch(e){} break;
    case 'qedit': { const ei=+el.dataset.ei; const f=el.dataset.f; const v=el.value; const ex=routine()[day].ex[ei]; if(ex){ if(f==='s') ex.s=+v||ex.s; else ex[f]=v; saveDB(); } break; }
    case 'import': importData(e); break;
  } }
  /* yesno reveal toggle */
  const yn=e.target.closest('[data-ftype="yesno"]');
  if(yn){ const fk=yn.getAttribute('data-fk'); document.querySelectorAll('[data-reveal="'+fk+'"]').forEach(function(el2){ el2.style.display=yn.value==='si'?'':'none'; }); }
});
document.addEventListener('input',e=>{ const el=e.target.closest('[data-chg="obs"]'); if(el) updObs(el.value); });
$('lb').addEventListener('click',()=>$('lb').classList.remove('show'));
$('mok').addEventListener('click',()=>_modalClose(true));
$('mcancel').addEventListener('click',()=>_modalClose(false));
$('minput').addEventListener('keydown',e=>{ if(e.key==='Enter') _modalClose(true); else if(e.key==='Escape') _modalClose(false); });
/* Cross-tab sync en mismo dispositivo */
window.addEventListener('storage',function(e){
  if(e.key&&shouldSync(e.key)&&!_fromRemote){
    _fromRemote=true;
    reloadFromRemote().then(function(){ _fromRemote=false; });
  }
});
</script>
</body>
